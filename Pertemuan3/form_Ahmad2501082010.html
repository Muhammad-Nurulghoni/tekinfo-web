<!DOCTYPE html>
<html>
	<head>
		<title>Halaman Form</title>
	</head>
	<body>
		<<h1>FORM PENDAFTARAN</h1>
	</body>
		<form>
		
		<table>
		<tr>
			<td width="120px"><label>Nama Lengkap</label></td>
			<td>:</td>
			<td><input type="text" name="nama" placeholder="Tulis nama lengkap" required></td>
		</tr>
		<tr>
			<td><label>NIM</label></td>
			<td>:</td>
			<td><input type="number" name=""></td>
		</tr>
		<tr>
			<td><label>Email</label></td>
			<td>:</td>
			<td><input type="email" name=""></td>
		</tr>
		<tr>
			<td><label>Password</label></td>
			<td>:</td>
			<td><input type="Password" ></td>
		</tr>
		<tr>
			<td><label>Tanggal Lahir</label></td>
			<td>:</td>
			<td><input type="date"></td>
		</tr>
		<tr>
			<td><label>Jenis Kelamin</label></td>
			<td>:</td>
			<td>
				<input type="radio" name="gender" value="l" > Laki-Laki
				<input type="radio" name="gender" value="p"> Perempuan
			</td>
		</tr>
		<tr>
			<td><label>Hobi</label></td>
			<td>:</td>
			<td>
				<input type="checkbox" > Olahraga
				<input type="checkbox" > Membaca
				<input type="checkbox" > Mengaji
			</td>
		</tr>
		<tr>
			<td><label>Agama</label></td>
			<td>:</td>
			<td>
				<select>
					<option></option>
					<option value="Islam"></option>
					<option>Khatolik</option>
					<option>Protestan</option>
					<option>Buddha</option>
					<option>Hindu</option>
					<option>Khonghucu</option>
				</select>
			</td>
		</tr>
		<tr>
			<td><label>Alamat</label></td>
			<td>:</td>
			<td><textarea rows="6" cols="100" type="text"></textarea></td>
		</tr>
		<tr>
			<td><label>Foto</label></td>
			<td>:</td>
			<td>
				<input type="file">
			</td>
		</tr>
		<tr>
			<td></td>
			<td></td>
			<td>
				<input type="submit" value="submit">
				<input type="reset">
			</td>
		</tr>
		
		</table>	
			
		</form>
</html>
